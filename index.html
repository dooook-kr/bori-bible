<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>보리의 성경책</title>

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dooook-kr.github.io/bori-bible/">
  <meta property="og:title" content="🌾 보리의 성경책">
  <meta property="og:description" content="글씨는 더 크게, 내용은 더 쉽게. 부모님을 위해 만든 모바일 성경책">
  <meta property="og:image" content="https://dooook-kr.github.io/bori-bible/og-image.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="🌾 보리의 성경책">
  <meta name="twitter:description" content="글씨는 더 크게, 내용은 더 쉽게. 부모님을 위해 만든 모바일 성경책">
  <meta name="twitter:image" content="https://dooook-kr.github.io/bori-bible/og-image.jpg">

  <link rel="stylesheet" href="style.css?v=3">
</head>

<body class="dark-mode">

  <div id="search-page" class="page active">
    <h1 class="main-title">🌾 보리의 성경책</h1>

    <div id="bookmark-container" class="section-container">
      <div class="bookmark-ribbon"></div>
      <div id="bookmark-section" style="position: relative;"></div>
    </div>

    <div id="selection-container" class="section-container">
      <div class="version-radio-group">
        <label><input type="radio" name="bible-version" value="basic" checked> 일반형</label>
        <label><input type="radio" name="bible-version" value="story"> 스토리형</label>
      </div>

      <div class="form-group">
        <label>성경책</label>
        <select id="select-book">
          <option value="">데이터를 불러오는 중...</option>
        </select>
      </div>
      <div class="form-group">
        <label>장</label>
        <select id="select-chapter">
          <option value="">성경책부터 선택하세요</option>
        </select>
      </div>
      <button id="btn-open">성경 읽기</button>
      <div id="error-msg" style="display:none; text-align:center; margin-top:15px; font-size:16px; color:#ddd;">
        성경책과 장을 <span style="color:var(--accent-color); font-weight:bold;">모두</span> 선택해 주세요
      </div>
    </div>

    <div class="theme-toggle-wrapper">
      <button id="btn-theme-toggle" class="theme-btn">밝은 모드로</button>
    </div>
  </div>

  <div id="read-page" class="page">
    <div class="sticky-header">
      <div class="top-nav">
        <button id="btn-home" class="btn-home-style">목록</button>
        <div class="zoom-controls">
          <button id="btn-zoom-out" class="zoom-btn minus">-</button>
          <span class="zoom-label">글자크기</span>
          <button id="btn-zoom-in" class="zoom-btn plus">+</button>
        </div>
      </div>

      <div class="read-nav">
        <!-- 🌟 상세 페이지 버전 선택 드롭다운 추가 -->
        <select id="select-version-read">
          <option value="basic">일반형</option>
          <option value="story">스토리형</option>
        </select>
        <select id="select-book-read"></select>
        <select id="select-chapter-read"></select>
      </div>
    </div>

    <div id="bible-content"></div>

    <div class="bottom-nav">
      <button id="btn-prev">이전 장으로</button>
      <button id="btn-next" class="btn-next-yellow">다음 장으로</button>
    </div>
  </div>

  <script src="app.js?v=2"></script>
</body>

</html>
